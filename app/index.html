<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script src="script2.js" defer></script>
    <title>Social Signup</title>
</head>
<body>
    <div class="form-section vh-100 d-flex flex-column justify-content-center align-items-center">
        
        <h1 class="mb-5">Login</h1><a href="signup.html">Don't have an account?</a>

        <div class="col-md-3">
            <form class="col g-3" enctype="multipart/form-data" id="loginForm">
            
                
                <div class="col-md-12 mb-3">
                    <label class="form-label">Registration No</label>
                    <input type="text" class="form-control" name="regdNo" pattern="^\d{2}[a-zA-Z]{3}\d{4}$" required>
                </div>
            
                <div class="col-md-12 mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" pattern="^[a-zA-Z0-9_]+$" required>
                </div>
            
                <div class="col-md-12 mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <div class="col-md-12 mb-3">
                    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
