<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="script2.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Social Signup</title>
</head>
<body>
<div class="total-container">
        <div class="form-part"><h1>Signup</h1><a href="index.html">Already have an account?</a>

                <form class="row g-3" enctype="multipart/form-data">
                
                    <!-- Required Fields -->
                    <div class="col-md-6">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                
                    <div class="col-md-6">
                        <label class="form-label">Registration No *</label>
                        <input type="text" class="form-control" name="regdNo" pattern="^\d{2}[a-zA-Z]{3}\d{4}$" required>
                    </div>
                
                    <div class="col-md-6">
                        <label class="form-label">Username *</label>
                        <input type="text" class="form-control" name="username" pattern="^[a-zA-Z0-9_]+$" required>
                    </div>
                
                    <div class="col-md-6">
                        <label class="form-label">College Email *</label>
                        <input type="email" class="form-control" name="email" pattern="^[a-zA-Z]+\.\d{2}[a-zA-Z]{3}\d{4}@vitapstudent\.ac\.in$" required>
                    </div>
                
                    <div class="col-md-6">
                        <label class="form-label">Password *</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                
                    <div class="col-md-6">
                        <label class="form-label">Confirm Password *</label>
                        <input type="password" class="form-control" name="confirmPassword" required>
                    </div>
                
                    <!-- Optional Fields -->
                    <div class="col-12">
                        <label class="form-label">Bio</label>
                        <textarea class="form-control" rows="3" name="bio"></textarea>
                    </div>
                
                    <div class="col-md-6">
                        <label class="form-label">College</label>
                        <input type="text" class="form-control" name="college">
                    </div>
                
                    <div class="col-md-3">
                        <label class="form-label">Branch</label>
                        <select class="form-select" name="branch">
                            <option selected disabled>Select Branch</option>
                            <option>CSE</option>
                            <option>Integrated M.Tech</option>
                            <option>IT</option>
                            <option>ECE</option>
                            <option>EEE</option>
                            <option>Mechanical</option>
                            <option>Civil</option>
                        </select>
                    </div>
                
                    <div class="col-md-3">
                        <label class="form-label">Year</label>
                        <select class="form-select" name="year">
                            <option selected disabled>Select Year</option>
                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                            <option>4th Year</option>
                        </select>
                    </div>
                
                    <!-- Tags / Add & Drop Fields -->
                    <div class="col-12">
                        <label class="form-label">Interests & Goals</label>
                        <input type="text" id="interestsInput" class="form-control"
                               placeholder="Add items (e.g. AI, Web Development, Startup)">
                        <input type="hidden" id="interestsHidden" name="interests">
                        <div id="interestsTags"></div>
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label">Career Goals</label>
                        <input type="text" id="careerGoalsInput" class="form-control"
                        placeholder="Add career goals">
                        <div id="careerGoalsTags" class="mt-2"></div>
                        <input type="hidden" id="careerGoalsHidden" name="careerGoals">
                    </div>
                    
                    <div class="col-12">
                        <label class="form-label">Skills Being Learned</label>
                        <input type="text" id="skillsInput" class="form-control"
                        placeholder="Type a skill and press Enter">
                        <div id="skillsTags" class="mt-2"></div>
                        <input type="hidden" id="skillsHidden" name="skills">
                    </div>  
                    
                    <div class="col-12">
                        <label class="form-label">Current Goals</label>
                        <input type="text" id="currentGoalsInput" class="form-control"
                        placeholder="Add current goals">
                        <div id="currentGoalsTags"></div>
                        <input type="hidden" id="currentGoalsHidden" name="currentGoals">
                    </div>
                
                    <div class="col-12">
                        <label class="form-label">Long-term Goal</label>
                        <input type="text" class="form-control" name="longTermGoal"
                               placeholder="Add long-term goal">
                    </div>
                
                    <!-- Profile Photo -->
                    <div class="col-12">
                        <label class="form-label">Profile Photo</label>
                        <input type="file" class="form-control" name="profilePhoto"
                               accept="image/*">
                    </div>
                
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </div>
                
                </form>
        
            </div>
        
        <div class="rightside"><img src="" alt="logo"></div>
</div>
</body>
</html>
